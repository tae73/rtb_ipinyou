# ESCM2-WC: 3-tower with DR debiasing (primary)
# feature_dims is runtime — not included here
embed_dim: 32
hidden_dims:
  - 128
  - 64
win_hidden_dims:
  - 64
  - 32
dropout: 0.3
loss_type: dr
dr_loss_type: mse
win_eps: 0.05
max_weight: 10.0
normalize_weights: true
cfr_lambda: 0.1
cfr_type: consistency
win_weight: 1.0
ctr_weight: 1.0
joint_weight: 1.0
impute_loss_weight: 0.5
impute_loss_type: mse  # 'mse' or 'huber'
impute_huber_delta: 0.1  # Huber delta (only when impute_loss_type=huber)
use_fm_interaction: true
use_layer_norm: true
use_numeric_bypass: false
stop_grad_win_embedding: false
impute_hidden_dims: null  # defaults to hidden_dims; e.g. [32, 16] for smaller tower
# Per-tower dropout (null → use global dropout)
win_dropout: null
ctr_dropout: null
impute_dropout: null
# External propensity (use LGB win PS for DR weights instead of internal win tower)
use_external_propensity: false
