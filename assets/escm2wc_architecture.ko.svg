<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" width="940" height="560" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif"><rect x="0" y="0" width="940" height="560" fill="#F9FAFB"/><text x="470.0" y="38" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="21" fill="#111827" font-weight="bold" text-anchor="middle">ESCM²-WC (DR): Win Tower를 이중 활용하는 3-tower 디바이어싱</text><text x="470.0" y="62" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#374151" font-weight="normal" text-anchor="middle">공유 트렁크 → Win / CTR / Imputation 타워; 이중 강건(DR) 보정 + ESMM 제약</text><rect x="40" y="250" width="150" height="70" rx="10" ry="10" fill="#FFFFFF" stroke="#111827" stroke-width="1.6" opacity="1.0"/><text x="115" y="282" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#111827" font-weight="bold" text-anchor="middle">피처 x</text><text x="115" y="299" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#111827" font-weight="bold" text-anchor="middle">(30개)</text><line x1="190" y1="285" x2="221.0" y2="285.0" stroke="#111827" stroke-width="2.2" stroke-linecap="round"/><polygon points="232.0,285.0 221.0,290.5 221.0,279.5" fill="#111827"/><rect x="232" y="235" width="150" height="100" rx="10" ry="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" opacity="1.0"/><text x="307" y="272" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold" text-anchor="middle">공유</text><text x="307" y="289" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold" text-anchor="middle">임베딩 + MLP</text><text x="307" y="306" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold" text-anchor="middle">트렁크</text><rect x="435" y="120" width="200" height="95" rx="10" ry="10" fill="#FFFFFF" stroke="#0D9488" stroke-width="2.2" opacity="1.0"/><text x="535" y="152" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14.5" fill="#0D9488" font-weight="bold" text-anchor="middle">Win 타워</text><text x="535" y="174" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">P(win | x)</text><text x="535" y="189" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">성향점수(propensity)</text><line x1="382" y1="285" x2="430.5" y2="177.0" stroke="#0D9488" stroke-width="1.8" stroke-linecap="round"/><polygon points="435.0,167.0 435.5,179.3 425.5,174.8" fill="#0D9488"/><rect x="435" y="250" width="200" height="95" rx="10" ry="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2.2" opacity="1.0"/><text x="535" y="282" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14.5" fill="#4F46E5" font-weight="bold" text-anchor="middle">CTR 타워</text><text x="535" y="304" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">P(click | win, x)</text><text x="535" y="319" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">비편향 pCTR</text><line x1="382" y1="285" x2="424.3" y2="294.6" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/><polygon points="435.0,297.0 423.1,299.9 425.5,289.2" fill="#4F46E5"/><rect x="435" y="380" width="200" height="95" rx="10" ry="10" fill="#FFFFFF" stroke="#9333EA" stroke-width="2.2" opacity="1.0"/><text x="535" y="412" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14.5" fill="#9333EA" font-weight="bold" text-anchor="middle">Imputation 타워</text><text x="535" y="434" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">δ̂ = 대체(impute)된</text><text x="535" y="449" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11.5" fill="#374151" font-weight="normal" text-anchor="middle">CTR 오차</text><line x1="382" y1="285" x2="431.2" y2="416.7" stroke="#9333EA" stroke-width="1.8" stroke-linecap="round"/><polygon points="435.0,427.0 426.0,418.6 436.3,414.8" fill="#9333EA"/><line x1="535" y1="215" x2="535.0" y2="237.0" stroke="#374151" stroke-width="1.8" stroke-linecap="round"/><polygon points="535.0,248.0 529.5,237.0 540.5,237.0" fill="#374151"/><text x="545" y="236" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="10" fill="#374151" font-weight="italic" text-anchor="start" font-style="italic">DR: w = win / P(win)</text><rect x="435" y="478" width="200" height="56" rx="10" ry="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.6" opacity="1.0"/><text x="535" y="500" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12.5" fill="#16A34A" font-weight="bold" text-anchor="middle">ESMM 결합 제약</text><text x="535" y="520" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#374151" font-weight="normal" text-anchor="middle">P(click,win) = P(win) × P(click|win)</text><rect x="700" y="95" width="210" height="70" rx="10" ry="10" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.8" opacity="1.0"/><text x="805" y="122" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12.5" fill="#0D9488" font-weight="bold" text-anchor="middle">(a) 디바이어싱</text><text x="805" y="142" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11" fill="#374151" font-weight="normal" text-anchor="middle">DR / IPW 성향점수</text><line x1="635" y1="150" x2="689.5" y2="133.2" stroke="#0D9488" stroke-width="1.8" stroke-linecap="round"/><polygon points="700.0,130.0 691.1,138.5 687.9,128.0" fill="#0D9488"/><rect x="700" y="185" width="210" height="70" rx="10" ry="10" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.8" opacity="1.0"/><text x="805" y="212" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12.5" fill="#0D9488" font-weight="bold" text-anchor="middle">(b) 비드 셰이딩</text><text x="805" y="232" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11" fill="#374151" font-weight="normal" text-anchor="middle">낙찰률 모델 (AUC ≈ 0.91)</text><line x1="635" y1="165" x2="691.3" y2="208.3" stroke="#0D9488" stroke-width="1.8" stroke-linecap="round"/><polygon points="700.0,215.0 687.9,212.7 694.6,203.9" fill="#0D9488"/><text x="805" y="78" font-family="DejaVu Sans, Segoe UI, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#111827" font-weight="bold" text-anchor="middle">Win 타워 이중 활용</text></svg>