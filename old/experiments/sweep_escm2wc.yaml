# W&B Sweep config for ESCM2-WC (3-tower, DR/IPW debiasing)
# Bayesian optimization with Hyperband early termination
#
# Usage:
#   python scripts/sweep.py create --config experiments/sweep_escm2wc.yaml
#   python scripts/sweep.py agent --sweep-id <id> --data-dir ... --model-dir ... --model-type escm2wc

method: bayes
metric:
  name: val_joint
  goal: minimize

parameters:
  # Architecture
  embedding_dim:
    values: [16, 32]
  hidden_dims:
    values: ["128,64", "256,128", "256,128,64"]
  win_hidden_dims:
    values: ["64,32", "128,64"]
  dropout:
    distribution: uniform
    min: 0.1
    max: 0.3
  use_layer_norm:
    values: [true, false]

  # Training
  learning_rate:
    distribution: log_uniform_values
    min: 0.0005
    max: 0.005
  batch_size:
    values: [32768, 65536]
  epochs:
    value: 50

  # Early stopping
  es_metric:
    value: joint
  patience:
    values: [10, 15]

  # Regularization
  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001
  scheduler:
    values: ["constant", "cosine"]
  warmup_steps:
    values: [0, 200, 500]
  gradient_clip:
    values: [0.0, 1.0]

  # Debiasing (ESCM2-WC specific)
  debiasing:
    values: ["dr", "ipw"]
  cfr_lambda:
    distribution: log_uniform_values
    min: 0.001
    max: 1.0
  win_eps:
    distribution: uniform
    min: 0.01
    max: 0.2
  max_weight:
    distribution: uniform
    min: 3.0
    max: 20.0
  impute_loss_weight:
    distribution: uniform
    min: 0.1
    max: 2.0
  win_weight:
    distribution: uniform
    min: 0.5
    max: 2.0
  ctr_weight:
    distribution: uniform
    min: 0.5
    max: 2.0
  joint_weight:
    distribution: uniform
    min: 0.5
    max: 2.0

early_terminate:
  type: hyperband
  min_iter: 10
  eta: 3
  s: 2
